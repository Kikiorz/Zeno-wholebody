# VC-ACT vc_k10: Cluster 4
# /venv/mult-act/bin/python3 /workspace/Mult-skill\ ACT/train/run_train.py --config <this_file>

runtime:
  command: "/venv/mult-act/bin/lerobot-train"
  check_command: true
  cwd: "."
  dry_run: false
  env:
    CUDA_VISIBLE_DEVICES: "1"
    WANDB_API_KEY: "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"

variables:
  dataset_id: "cluster4_v30"
  dataset_root: "/workspace/Mult-skill ACT/data/vc_k10"
  output_root: "/workspace/Mult-skill ACT/VC-ACT/models/exp_k10"
  run_name: "vc_k10_cluster4"

train_args:
  dataset:
    repo_id: "{dataset_id}"
    root: "{dataset_root}/{dataset_id}"
    video_backend: "torchcodec"

  policy:
    type: "act"
    device: "cuda"
    repo_id: "local/{run_name}"
    push_to_hub: false
    use_amp: true
    n_obs_steps: 1
    chunk_size: 100
    n_action_steps: 100

  steps: 100010
  batch_size: 8
  num_workers: 16
  save_freq: 20000
  log_freq: 200
  wandb:
    mode: "disabled"

  output_dir: "{output_root}/{run_name}"

flags: []
raw_args: []
